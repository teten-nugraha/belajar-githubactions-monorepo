name: Loan CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'loan-service/**'

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: echo "Building loan service"

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "Packaging loan service"

  deploy:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying loan service"